name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Single source of truth for the merge gate. `./gradlew build` runs compile + the full test
# suite + `check`, which wires in `lintDropRates` and the guidance-config invariant ratchet
# (GuidanceConfigInvariantsRegressionTest). A green `build` job therefore proves the data and
# guidance gates as well as the code, and is the required status check for auto-merge.
# JDK 11 matches the RuneLite Plugin Hub build environment.
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build, test, check (compile + tests + lintDropRates + guidance ratchet)
        run: ./gradlew build --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/
          retention-days: 7

  # The repo's verification scripts under scripts/ are stdlib-only Python. The
  # Gradle build does not exercise them (the guidanceStatus task that shells out
  # to them is standalone, not wired into `check`), so this job builds them in
  # CI directly: a byte-compile pass over every script catches syntax breakage,
  # and the acceptance-runner unit suite pins the synthesize-events contract.
  scripts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Byte-compile all scripts (build check)
        run: python -m py_compile scripts/*.py

      - name: Run acceptance-runner unit tests
        working-directory: scripts
        run: python -m unittest test_acceptance_runner -v
