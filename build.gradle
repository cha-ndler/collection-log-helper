plugins {
	id 'java'
	id 'jacoco'
}

ext {
	pluginName = 'Collection Log Helper'
	pluginDescription = 'Guides players through efficient collection log completion with overlays and efficiency scoring'
	pluginProvider = 'cha-ndler'
}

repositories {
	mavenLocal()
	maven {
		url = 'https://repo.runelite.net'
		content {
			includeGroupByRegex("net\\.runelite.*")
		}
	}
	mavenCentral()
}

def runeLiteVersion = '1.12.26.3'
def pluginMainClass = 'com.collectionloghelper.CollectionLogHelperPlugin'

dependencies {
	compileOnly group: 'net.runelite', name:'client', version: runeLiteVersion

	compileOnly 'org.projectlombok:lombok:1.18.30'
	annotationProcessor 'org.projectlombok:lombok:1.18.30'

	testImplementation 'junit:junit:4.12'
	testImplementation 'org.mockito:mockito-core:4.11.0'
	testImplementation group: 'net.runelite', name:'client', version: runeLiteVersion
	testImplementation group: 'net.runelite', name:'jshell', version: runeLiteVersion

	testCompileOnly 'org.projectlombok:lombok:1.18.30'
	testAnnotationProcessor 'org.projectlombok:lombok:1.18.30'
}

group = 'com.collectionloghelper'
version = '1.0-SNAPSHOT'

tasks.withType(JavaCompile).configureEach {
	options.encoding = 'UTF-8'
	options.release.set(11)
}

tasks.register('run', JavaExec) {
	classpath = sourceSets.test.runtimeClasspath
	mainClass = 'com.collectionloghelper.CollectionLogHelperPluginTest'

	// JDK 17+ requires explicit module opens for RuneLite's reflection paths.
	// Without these, ReflectUtil.invalidateAnnotationCaches() throws
	// InaccessibleObjectException during startup and reflection-heavy features
	// (annotation cache busting, AWT/Swing internals, GPU plugin) degrade silently.
	jvmArgs "-ea",
		"--add-opens=java.base/java.lang=ALL-UNNAMED",
		"--add-opens=java.base/java.lang.reflect=ALL-UNNAMED",
		"--add-opens=java.base/java.util=ALL-UNNAMED",
		"--add-opens=java.desktop/sun.awt=ALL-UNNAMED",
		"--add-opens=java.desktop/javax.swing.text.html=ALL-UNNAMED"
	args "--developer-mode", "--debug"
}

jacoco {
	toolVersion = "0.8.11"
}

jacocoTestReport {
	dependsOn test
	reports {
		xml.required = true
		html.required = true
	}
}

jacocoTestCoverageVerification {
	afterEvaluate {
		classDirectories.setFrom(files(classDirectories.files.collect {
			fileTree(dir: it, exclude: [
				// RuneLite plugin entry point — not unit-testable without full client
				'**/*Plugin.class',
				// Config interfaces — generated by RuneLite annotation processor
				'**/*Config.class',
				// Lambda synthetic classes — compiler-generated
				'**/*$Lambda*.class',
				// UI panels and widgets — Swing-heavy, require a display
				'**/ui/**',
				// Overlay renderers — require RuneLite graphics context
				'**/overlay/**',
				// Enum-only / data-holder value types
				'**/AccountType.class',
				'**/AfkFilter.class',
				'**/EfficientSortMode.class',
				'**/data/ItemObjectTier.class',
				'**/data/RewardType.class',
				'**/data/Zone.class'
			])
		}))
	}
	violationRules {
		rule {
			limit {
				// Starting threshold; raise to 0.80 once overlay/UI unit tests are added.
				minimum = 0.45
			}
		}
	}
}

test {
	finalizedBy jacocoTestReport
}

check.dependsOn jacocoTestCoverageVerification

tasks.register('lintDropRates') {
	group = 'verification'
	description = 'Fails if drop_rates.json contains non-ASCII characters.'
	def jsonFile = file('src/main/resources/com/collectionloghelper/drop_rates.json')
	inputs.file(jsonFile)
	doLast {
		if (!jsonFile.exists()) {
			throw new GradleException("Missing ${jsonFile}")
		}
		def violations = []
		int lineNo = 0
		jsonFile.eachLine('UTF-8') { line ->
			lineNo++
			for (int i = 0; i < line.length(); i++) {
				int cp = line.codePointAt(i)
				if (cp > 0x7f) {
					violations << "  line ${lineNo} col ${i + 1}: codepoint U+${String.format('%04X', cp)} ('${new String(Character.toChars(cp))}')"
					break
				}
			}
		}
		if (!violations.isEmpty()) {
			throw new GradleException("Non-ASCII characters in drop_rates.json:\n" + violations.take(20).join("\n") + (violations.size() > 20 ? "\n  ... and ${violations.size() - 20} more" : "") + "\nPolicy: drop_rates.json must be ASCII-only. Replace fancy punctuation (em-dash, smart quotes, ellipsis, non-breaking space) with ASCII equivalents.")
		}
	}
}
check.dependsOn lintDropRates

tasks.register('shadowJar', Jar) {
	dependsOn configurations.runtimeClasspath
	manifest {
		attributes('Main-Class': pluginMainClass, 'Multi-Release': true)
	}

	duplicatesStrategy = DuplicatesStrategy.EXCLUDE
	from sourceSets.main.output
	from {
		configurations.runtimeClasspath.collect { file ->
			file.isDirectory() ? file : zipTree(file)
		}
	}

	exclude 'META-INF/INDEX.LIST'
	exclude 'META-INF/*.SF'
	exclude 'META-INF/*.DSA'
	exclude 'META-INF/*.RSA'
	exclude '**/module-info.class'

	group = BasePlugin.BUILD_GROUP
	archiveClassifier.set('shadow')
	archiveFileName.set("${rootProject.name}-${project.version}-all.jar")
}
